<div class="flex flex-col h-full">

  <!-- Header -->
  <div class="px-5 py-4 border-b border-border shrink-0">
    <h2 class="text-sm font-semibold uppercase tracking-widest text-muted-foreground">Artistas</h2>
  </div>

  <!-- Grid de artistas -->
  <ul class="flex-1 overflow-y-auto p-4 grid grid-cols-2 gap-3 content-start scrollbar-thin scrollbar-thumb-muted scrollbar-track-transparent">
    @for (artista of artistas(); track artista.id) {
      <li [routerLink]="['/public/home/artista', artista.id]" class="group flex items-center gap-3 p-3 rounded-xl bg-card border border-border hover:border-primary/40 hover:bg-muted transition-all duration-150 cursor-pointer">

        <!-- Avatar iniciales -->
        <div class="w-9 h-9 rounded-full bg-primary/15 flex items-center justify-center shrink-0">
          <span class="text-xs font-bold text-primary">{{ artista.nombre[0] | uppercase }}</span>
        </div>

        <div class="flex flex-col min-w-0">
          <span class="text-sm font-medium text-foreground truncate">{{ artista.nombre }}</span>
          <span class="text-xs text-muted-foreground truncate">{{ artista.pais }}</span>
        </div>

      </li>
    } @empty {
      <li class="col-span-2 py-8 text-sm text-muted-foreground text-center">Sin artistas</li>
    }
  </ul>

</div>
