<!-- Backdrop -->
<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm"
  (click)="onBackdropClick($event)"
>
  <!-- Panel -->
  <div class="w-full max-w-md rounded-xl bg-card border border-border shadow-2xl p-6 mx-4">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-lg font-semibold text-foreground">Nueva Playlist</h2>
      <button
        type="button"
        (click)="onCerrar()"
        class="w-8 h-8 flex items-center justify-center rounded-md text-muted-foreground hover:text-foreground hover:bg-muted transition-colors"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()">
      <div class="mb-6">
        <label for="nombre" class="block text-sm font-medium text-foreground mb-2">
          Nombre de la playlist
        </label>
        <input
          id="nombre"
          type="text"
          [ngModel]="nombre()"
          (ngModelChange)="nombre.set($event)"
          name="nombre"
          placeholder="Mi playlist favorita..."
          autofocus
          class="w-full px-3 py-2 rounded-md bg-background border border-border text-foreground placeholder:text-muted-foreground text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition"
        />
      </div>

      <!-- Actions -->
      <div class="flex justify-end gap-3">
        <button
          type="button"
          (click)="onCerrar()"
          class="px-4 py-2 text-sm rounded-md text-muted-foreground hover:text-foreground hover:bg-muted transition-colors"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="!nombre().trim()"
          class="px-4 py-2 text-sm rounded-md bg-primary text-primary-foreground font-medium hover:bg-primary/90 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
        >
          Crear playlist
        </button>
      </div>
    </form>

  </div>
</div>
