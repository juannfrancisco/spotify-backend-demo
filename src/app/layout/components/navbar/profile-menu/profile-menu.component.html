<div class="relative ml-3">
  <!-- Profile Button -->
  <button (click)="toggleMenu()" class="bg-card relative flex rounded-full text-sm" type="button">
    <span class="sr-only">Abrir menú usuario</span>
    <img
      clickOutside
      (clickOutside)="isOpen = false"
      class="h-9 w-9 rounded-md"
      [src]="profile.avatar" alt=" {{profile.name}}"  />
  </button>
  <!-- Dropdown -->
  <div
    [@openClose]="isOpen ? 'open' : 'closed'"
    class="bg-background shadow-custom absolute z-20 mt-2 w-80 origin-top-right transform rounded-md py-4 ring-1 ring-transparent ring-opacity-5 transition focus:outline-hidden ltr:right-0 rtl:left-0">
    <div class="flext-row flex items-center px-4 pb-4">
      <div class="w-10 shrink-0">
        <img class="rounded-md" [src]="profile.avatar" alt=" {{profile.name}}" />
      </div>
      <div class="text-foreground overflow-hidden px-2 py-1 text-sm font-semibold">
        {{profile.name}}
        <p class="text-muted-foreground truncate text-ellipsis py-1 text-xs font-normal">{{profile.email}}</p>
        <div class="border-border border-b border-dashed"></div>
      </div>
    </div>

    <div class="border-border border-b border-dashed"></div>

    <ul class="my-2 mx-4 flex flex-col">
      @for (item of profileMenu; track $index) {
      <li
        (click)="item.action()"
        (keypress)="item.action()"
        [tabindex]="$index"
        :key="$index"
        class="text-muted-foreground hover:bg-card hover:text-primary inline-flex cursor-pointer items-center gap-2 rounded-md px-3 py-2 text-xs font-semibold">
        <svg-icon src="{{ item.icon }}" [svgClass]="'h-5 w-5 text-muted-foreground/50'"> </svg-icon>
        {{ item.title }}
      </li>
      }
    </ul>
    
  </div>
</div>
