<!DOCTYPE html>
<html lang="en" data-theme="blue" class="dark" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>Spotify</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Deshabilitamos temporalmente COOP para desarrollo -->
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups" />

    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>

  <body class="bg-background font-poppins selection:bg-primary selection:text-primary-foreground">
    <app-root>
      <div class="flex h-screen">
        <div class="m-auto">
          <div class="flex flex-col items-center justify-center transition duration-150 ease-in-out">
            <img src="images/isotipo.png" alt="logo" width="200" height="200" class="mx-auto block animate-pulse" />
            <span class="text-foreground text-center">cargando...</span>
          </div>
        </div>
      </div>
    </app-root>

</html>
